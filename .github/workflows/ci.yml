name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # The workspace build always enables the core's `serde` feature through the
      # CLI, so this guards that the core still builds serde-free and no_std.
      - name: Core no_std build (default features)
        run: cargo build -p spdr

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace
